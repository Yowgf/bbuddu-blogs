name: Revalidate bbuddu blog

# On every push that touches a post, tell the live site to drop its blog cache so
# the change appears immediately (the 5-minute ISR window is the fallback).
on:
  push:
    branches: [master]
    paths: ['posts/**']

jobs:
  revalidate:
    runs-on: ubuntu-latest
    steps:
      - name: Ping the revalidate endpoint
        env:
          REVALIDATE_SECRET: ${{ secrets.REVALIDATE_SECRET }}
        run: |
          curl -fsS -X POST https://bbuddu.com/api/blog/revalidate \
            -H 'Content-Type: application/json' \
            -H 'User-Agent: bbuddu-blog-publish (github-actions)' \
            -d "{\"secret\":\"${REVALIDATE_SECRET}\",\"tags\":[\"blog\"]}"
